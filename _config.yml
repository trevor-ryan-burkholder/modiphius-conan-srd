title: 'Conan SRD'
tagline: 'A fan reference for the 2d20 Hyborian Age'
description: >
  An unofficial system reference document covering the mechanical core
  of the 2d20 system as used in the Hyborian Age - for personal use
  among a small group of friends.
author: 'Marginalia'

url: 'https://trevor-ryan-burkholder.github.io'
baseurl: '/modiphius-conan-srd'

markdown: kramdown
highlighter: rouge
permalink: /:path/

kramdown:
  input: GFM
  syntax_highlighter: rouge
  toc_levels: 2..3

collections:
  pages:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ''
      type: 'pages'
    values:
      layout: 'default'
  - scope:
      path: ''
    values:
      layout: 'default'

nav:
  - title: 'Foreword'
    url: '/'
  - title: 'I. Getting Started'
    url: '/getting-started/'
  - title: 'II. The Core Mechanic'
    url: '/core-mechanic/'
  - title: 'III. Attributes'
    url: '/attributes/'
  - title: 'IV. Skills & Focus'
    url: '/skills/'
  - title: 'V. Talents'
    url: '/talents/'
  - title: '    Talents Index'
    url: '/talents-list/'
  - title: 'VI. Character Creation'
    url: '/character-creation/'
  - title: 'VII. Momentum & Doom'
    url: '/momentum-and-doom/'
  - title: 'VIII. Action Scenes'
    url: '/action-scenes/'
  - title: 'IX. Combat'
    url: '/combat/'
  - title: 'X. Damage, Wounds & Recovery'
    url: '/damage-and-recovery/'
  - title: 'XI. Equipment'
    url: '/equipment/'
  - title: '    Weapons Catalog'
    url: '/weapons/'
  - title: '    Armor & Shields'
    url: '/armor/'
  - title: 'XII. Sorcery'
    url: '/sorcery/'
  - title: '    Spells Index'
    url: '/spells-list/'
  - title: 'XIII. Gamemastering'
    url: '/gamemastering/'
  - title: 'XIV. Encounters'
    url: '/encounters/'
  - title: '    Bestiary'
    url: '/bestiary/'
  - title: 'XV. Tables Appendix'
    url: '/appendix-tables/'

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - node_modules
  - .github
